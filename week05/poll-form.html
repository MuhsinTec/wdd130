<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poll Form Exercise</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <main>
        <form>
            <fieldset>
                <legend>Contact information</legend>
                <!-- Name -->
                <div class="form-item">
                    <label for="fullname">Full Name:</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>

                <!-- Email -->
                <div class="form-item">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
            </fieldset>

            <!-- Browser (Dropdown) -->
            <fieldset>
                <legend>Questions</legend>
                <div class="form-item">
                    <label for="browser">What is your favorite Browser:</label>
                    <select id="browser" name="browser">
                        <option value="" selected disabled>Choose One...</option>
                        <option value="chrome">Chrome</option>
                        <option value="firefox">Firefox</option>
                        <option value="edge">Edge</option>
                    </select>
                </div>

                <!-- Checkbox -->
                <div class="form-item">
                    <label>Do you have a household pet:</label>
                    <input type="checkbox" id="dog" name="pet" value="dog">
                    <label for="dog">Dog</label>

                    <input type="checkbox" id="cat" name="pet" value="cat">
                    <label for="cat">Cat</label>
                </div>

                <!-- Textarea -->
                <div class="form-item">
                    <label for="places">Places You Have Lived:</label>
                    <textarea id="places" name="places" rows="4"></textarea>
                </div>

                <!-- Submit -->
                <div class="form-item">
                    <button type="submit">Submit</button>
                </div>
            </fieldset>

        </form>
    </main>
</body>

</html>
